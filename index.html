<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>הרשמת מאבטח – StrongLight GuardSystem</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --text: #e5e5e7;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .header {
            padding: 1.2rem 0 0.5rem;
            text-align: center;
            width: 100%;
            background: var(--bg);
        }
        .header h1 {
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .header p {
            color: #98989d;
            font-size: 0.8rem;
            margin-top: 0.2rem;
        }
        iframe {
            flex: 1;
            width: 100%;
            border: none;
            background: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛡️ הרשמת מאבטח</h1>
        <p>מלא את הפרטים והעלה מסמכים</p>
    </div>
    <iframe src="https://script.google.com/macros/s/AKfycbxKz50TVijtICxwF4otyJJq6Ifz3dAL259ZWoA_BI-Gi2t1MuD-LGsNZdnvM2vM2VBqWQ/exec" 
            title="טופס הרשמה" 
            sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-modals">
    </iframe>
</body>
</html>
