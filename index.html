<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guard Registration</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: auto; padding: 20px; background: #f5f5f5; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        input, select, textarea { width: 100%; padding: 8px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; }
        button { margin-top: 20px; width: 100%; padding: 10px; background: #0F66C8; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        .file-label { background: #e0e0e0; cursor: pointer; padding: 10px; text-align: center; }
        .file-label input { display: none; }
    </style>
</head>
<body>
    <h2>טופס הרשמה – GuardSystem</h2>
    <form id="guardForm">
        <label>שם מלא <input type="text" id="fullName" required></label>
        <label>ת.ז. <input type="text" id="idNumber" required></label>
        <label>טלפון <input type="tel" id="phone" required></label>
        <label>אימייל <input type="email" id="email" required></label>
        <label>היקף משרה
            <select id="jobScope">
                <option value="מלאה">מלאה</option>
                <option value="חלקית">חלקית</option>
            </select>
        </label>
        <label>זמינות שבתות
            <select id="saturdayAvailable">
                <option value="כן">כן</option>
                <option value="לא">לא</option>
            </select>
        </label>
        <label>רישיון נהיגה בתוקף
            <select id="driverLicense">
                <option value="כן">כן</option>
                <option value="לא">לא</option>
            </select>
        </label>
        <label>רכב אישי
            <select id="selfMobility">
                <option value="כן">כן</option>
                <option value="לא">לא</option>
            </select>
        </label>
        <label>רישיון נשק ארגוני
            <select id="weaponLicense">
                <option value="כן">כן</option>
                <option value="לא">לא</option>
            </select>
        </label>
        <label>קורות חיים
            <span class="file-label">בחר קובץ <input type="file" id="cv" accept=".pdf,.doc,.docx"></span>
        </label>
        <label>תעודת זהות (צד קדמי)
            <span class="file-label">בחר קובץ <input type="file" id="idFront" accept=".pdf,.jpg,.png"></span>
        </label>
        <label>רישיון נהיגה
            <span class="file-label">בחר קובץ <input type="file" id="driver" accept=".pdf,.jpg,.png"></span>
        </label>
        <label>תעודת שחרור בכבוד
            <span class="file-label">בחר קובץ <input type="file" id="discharge" accept=".pdf,.jpg,.png"></span>
        </label>
        <label>תעודת זהות (צד אחורי)
            <span class="file-label">בחר קובץ <input type="file" id="idBack" accept=".pdf,.jpg,.png"></span>
        </label>
        <label>ספח (תעודת זהות)
            <span class="file-label">בחר קובץ <input type="file" id="idSupplement" accept=".pdf,.jpg,.png"></span>
        </label>
        <label>הערות נוספות <textarea id="notes" rows="3"></textarea></label>
        <button type="submit">שלח טופס</button>
    </form>

    <script>
        const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzs0c7vOJ6SKNYXe-uYxMZ0GT-2BaLvJ560JZnb3y2zzAHbDJko8i_OAMET7loHOtxK/exec';

        function readFileAsBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = () => {
                    const base64 = reader.result.split(',')[1];
                    resolve(base64);
                };
                reader.onerror = reject;
                reader.readAsDataURL(file);
            });
        }

        document.getElementById('guardForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                language: 'he',
                fullName: document.getElementById('fullName').value,
                idNumber: document.getElementById('idNumber').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                jobScope: document.getElementById('jobScope').value,
                saturdayAvailable: document.getElementById('saturdayAvailable').value === 'כן',
                driverLicense: document.getElementById('driverLicense').value === 'כן',
                selfMobility: document.getElementById('selfMobility').value === 'כן',
                weaponLicense: document.getElementById('weaponLicense').value === 'כן',
                notes: document.getElementById('notes').value
            };

            // קבצים לעיבוד
            const fileFields = ['cv', 'idFront', 'driver', 'discharge', 'idBack', 'idSupplement'];
            for (const field of fileFields) {
                const fileInput = document.getElementById(field);
                if (fileInput.files.length > 0) {
                    const file = fileInput.files[0];
                    try {
                        const content = await readFileAsBase64(file);
                        data[field] = {
                            name: file.name,
                            mime: file.type,
                            content: content
                        };
                    } catch (err) {
                        console.error('Failed to read file: ' + field, err);
                    }
                }
            }

            try {
                const response = await fetch(WEBAPP_URL, {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
                const text = await response.text();
                if (text.trim() === 'OK') {
                    alert('✅ הטופס נשלח בהצלחה!');
                    document.getElementById('guardForm').reset();
                } else {
                    alert('שגיאה: ' + text);
                }
            } catch (err) {
                alert('שגיאת רשת: ' + err.message);
            }
        });
    </script>
</body>
</html>
