<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shield – לוח בקרה</title>
    <link rel="icon" type="image/svg+xml" href="https://StrongLightSys.github.io/guard-onboarding/images/shield-logo.svg?v=20260528">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        /* ... כל הסגנונות של v6 ... */
    </style>
</head>
<body>
    <div class="shield-header" id="shieldHeader">
        <div class="brand">
            <img src="https://StrongLightSys.github.io/guard-onboarding/images/shield-logo.svg" alt="Shield">
            <div>
                <h1>Shield by StrongLight</h1>
                <div class="subtitle">לוח בקרה</div>
            </div>
        </div>
        <div class="header-actions">
            <span class="datetime" id="liveDateTime"></span>
            <button class="mode-toggle" id="modeToggle" aria-label="החלף מצב תצוגה">
                <span class="material-icons">dark_mode</span>
            </button>
            <button class="btn" id="logoutBtn" style="display:none;" onclick="logout()">
                <span class="material-icons">logout</span> התנתק
            </button>
        </div>
    </div>

    <div class="dashboard">
        <!-- כרטיסי סטטיסטיקה -->
        <div class="stats">
            <div class="stat-card"><div class="stat-icon"><span class="material-icons">people</span></div><div class="stat-content"><div class="stat-label">סה"כ</div><div class="stat-value" id="totalCount" data-target="0">0</div></div></div>
            <div class="stat-card"><div class="stat-icon"><span class="material-icons">pending_actions</span></div><div class="stat-content"><div class="stat-label">ממתינים</div><div class="stat-value" style="color: var(--yellow);" id="pendingCount" data-target="0">0</div></div></div>
            <div class="stat-card"><div class="stat-icon"><span class="material-icons">check_circle</span></div><div class="stat-content"><div class="stat-label">טופלו</div><div class="stat-value" style="color: var(--green);" id="doneCount" data-target="0">0</div></div></div>
            <div class="stat-card"><div class="stat-icon"><span class="material-icons">today</span></div><div class="stat-content"><div class="stat-label">היום</div><div class="stat-value" id="todayCount" data-target="0">0</div></div></div>
        </div>

        <!-- סרגל כלים + טבלה -->
        <div class="bulk-bar" id="bulkBar">
            <span id="bulkSelected">0 נבחרו</span>
            <div>
                <button class="bulk-btn" onclick="bulkToggleStatus('TRUE')">סמן כמטופלים</button>
                <button class="bulk-btn" onclick="bulkToggleStatus('FALSE')">סמן כממתינים</button>
            </div>
        </div>

        <div class="controls">
            <div class="search-wrapper">
                <span class="material-icons">search</span>
                <input type="text" class="search-input" placeholder="חיפוש לפי שם או ת.ז..." id="searchInput">
            </div>
            <select class="filter-select" id="statusFilter">
                <option value="all">כל הסטטוסים</option>
                <option value="FALSE">ממתינים</option>
                <option value="TRUE">טופלו</option>
            </select>
            <button class="btn" id="clearBtn" onclick="clearFilters()" disabled>
                <span class="material-icons" style="font-size:18px;">close</span> נקה
            </button>
            <span class="results-count" id="resultsCount">מציג 0 תוצאות</span>
            <button class="btn" onclick="exportCSV()">
                <span class="material-icons">download</span> יצוא
            </button>
            <button class="btn btn-primary" onclick="fetchData()">
                <span class="material-icons">refresh</span> רענן
            </button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead><tr><th style="width:40px;"><input type="checkbox" id="selectAll" onchange="toggleSelectAll()"></th><th style="width:140px;" onclick="sortTable('submissionDate')" class="sorted"><span class="material-icons">sort</span>תאריך</th><th style="width:190px;" onclick="sortTable('fullName')"><span class="material-icons">sort</span>שם מלא</th><th style="width:120px;" onclick="sortTable('idNumber')"><span class="material-icons">sort</span>ת.ז.</th><th style="width:140px;" onclick="sortTable('phone')"><span class="material-icons">sort</span>טלפון</th><th style="width:110px;" onclick="sortTable('status')"><span class="material-icons">sort</span>סטטוס</th><th style="width:90px;">פעולות</th></tr></thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://script.google.com/macros/s/AKfycbwUEmK3x6zg4nSf4SHTzzKTPp1ImIH3fsnoAuH7zRP37BKUUnPsMutnx9_ybIwsDXaudQ/exec';
        let API_KEY = '';
        let currentData = [];
        let currentSort = { field: 'submissionDate', asc: false };
        let selectedRows = new Set();
        let debounceTimer;
        let inactivityTimer;

        function updateDateTime() {
            const now = new Date();
            document.getElementById('liveDateTime').textContent = now.toLocaleString('he-IL', { year:'numeric', month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false }).replace(',', '');
        }
        updateDateTime(); setInterval(updateDateTime, 1000);

        function relativeTime(date) {
            const now = new Date();
            const diffMs = now - date;
            const diffMins = Math.floor(diffMs / 60000);
            const diffHrs = Math.floor(diffMins / 60);
            const diffDays = Math.floor(diffHrs / 24);
            if (diffMins < 1) return "עכשיו";
            if (diffMins < 60) return `לפני ${diffMins} דק׳`;
            if (diffHrs < 24) return `לפני ${diffHrs} שע׳`;
            if (diffDays < 7) return `לפני ${diffDays} ימים`;
            return date.toLocaleDateString('he-IL', { day:'2-digit', month:'2-digit', year:'numeric' });
        }

        // ========== AUTH ==========
        async function login(password) {
            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'login', password })
                });
                const result = await resp.json();
                if (result.success) {
                    API_KEY = 'a7f9c2e1-4b6d-8a3f-2c7e9d5b1f0a'; // קבוע
                    localStorage.setItem('shield-dashboard-token', result.token);
                    localStorage.setItem('shield-dashboard-token-expiry', Date.now() + result.expiresIn * 1000);
                    document.getElementById('logoutBtn').style.display = 'flex';
                    startInactivityTimer();
                    return true;
                }
                return false;
            } catch { return false; }
        }

        async function validateToken(token) {
            try {
                const resp = await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'validateToken', token })
                });
                const result = await resp.json();
                return result.valid;
            } catch { return false; }
        }

        async function logout() {
            const token = localStorage.getItem('shield-dashboard-token');
            if (token) {
                await fetch(API_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'logout', token })
                });
            }
            localStorage.removeItem('shield-dashboard-token');
            localStorage.removeItem('shield-dashboard-token-expiry');
            location.reload();
        }

        function startInactivityTimer() {
            clearTimeout(inactivityTimer);
            inactivityTimer = setTimeout(logout, 5 * 60 * 1000); // 5 דקות
        }

        // ========== DATA ==========
        async function fetchData() {
            const statusFilter = document.getElementById('statusFilter').value;
            const search = document.getElementById('searchInput').value;
            let url = `${API_URL}?apiKey=${API_KEY}`;
            if (statusFilter !== 'all') url += `&status=${statusFilter}`;
            if (search) url += `&search=${encodeURIComponent(search)}`;

            try {
                const resp = await fetch(url);
                const data = await resp.json();
                if (data.error) {
                    alert('הגישה נדחתה. נסה להתחבר מחדש.');
                    logout();
                    return;
                }
                currentData = data.map(d => ({ ...d, submissionDate: new Date(d.submissionDate) }));
                renderTable();
            } catch (err) {
                console.error(err);
            }
        }

        async function updateStatus(rowIndex, newStatus) {
            await fetch(API_URL, {
                method: 'POST',
                body: JSON.stringify({ apiKey: API_KEY, rowIndex, newStatus })
            });
            fetchData();
        }

        function renderTable() {
            let filteredData = [...currentData];
            if (currentSort.field) {
                filteredData.sort((a, b) => {
                    let valA = a[currentSort.field], valB = b[currentSort.field];
                    if (currentSort.field === 'submissionDate') { valA = a.submissionDate.getTime(); valB = b.submissionDate.getTime(); }
                    else { valA = (valA||'').toString(); valB = (valB||'').toString(); }
                    if (valA < valB) return currentSort.asc ? -1 : 1;
                    if (valA > valB) return currentSort.asc ? 1 : -1;
                    return 0;
                });
            }

            const tbody = document.getElementById('tableBody');
            if (filteredData.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;padding:2rem;">אין תוצאות.</td></tr>';
            } else {
                tbody.innerHTML = filteredData.map(row => {
                    const initials = (row.fullName||'').split(' ').map(w => w[0]).join('').slice(0, 2);
                    const fullDate = row.submissionDate.toLocaleString('he-IL', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' });
                    return `
                    <tr class="${selectedRows.has(row.rowIndex) ? 'selected' : ''}">
                        <td data-label="בחר"><input type="checkbox" class="row-checkbox" data-id="${row.rowIndex}" ${selectedRows.has(row.rowIndex) ? 'checked' : ''} onchange="toggleRowSelect(${row.rowIndex})"></td>
                        <td data-label="תאריך">${fullDate}<br><small style="color:var(--text-secondary);">${relativeTime(row.submissionDate)}</small></td>
                        <td data-label="שם"><div style="display:flex;align-items:center;gap:0.4rem;"><div class="avatar">${initials}</div>${row.fullName}</div></td>
                        <td data-label="ת.ז.">${row.idNumber}</td>
                        <td data-label="טלפון">${row.phone}</td>
                        <td data-label="סטטוס"><div class="status-cell"><span class="status-dot ${row.status==='FALSE'?'pending':'processed'}"></span><span class="status-badge ${row.status==='FALSE'?'status-pending':'status-processed'}">${row.status==='FALSE'?'ממתין':'טופל'}</span></div></td>
                        <td data-label="פעולות">
                            ${row.profileUrl ? `<a href="${row.profileUrl}" target="_blank" class="action-btn" title="צפייה בפרופיל"><span class="material-icons">visibility</span></a>` : ''}
                            <button class="action-btn" title="החלף סטטוס" onclick="toggleStatus(${row.rowIndex})"><span class="material-icons">swap_horiz</span></button>
                        </td>
                    </tr>
                `}).join('');
            }
            document.getElementById('resultsCount').textContent = `מציג ${filteredData.length} תוצאות`;
            updateStats();
        }

        function updateStats() {
            const total = currentData.length;
            const pending = currentData.filter(r => r.status === 'FALSE').length;
            const done = total - pending;
            const today = currentData.filter(r => r.submissionDate.toDateString() === new Date().toDateString()).length;
            animateValue('totalCount', total);
            animateValue('pendingCount', pending);
            animateValue('doneCount', done);
            animateValue('todayCount', today);
        }

        function animateValue(id, target) {
            const el = document.getElementById(id);
            const current = parseInt(el.textContent) || 0;
            if (current === target) return;
            const step = Math.ceil((target - current) / 15);
            let val = current;
            const timer = setInterval(() => {
                val += step;
                if ((step > 0 && val >= target) || (step < 0 && val <= target)) { val = target; clearInterval(timer); }
                el.textContent = val;
            }, 40);
        }

        function toggleStatus(rowIndex) {
            const row = currentData.find(r => r.rowIndex === rowIndex);
            if (row) {
                const newStatus = row.status === 'FALSE' ? 'TRUE' : 'FALSE';
                updateStatus(rowIndex, newStatus);
            }
        }

        function toggleRowSelect(id) {
            if (selectedRows.has(id)) selectedRows.delete(id); else selectedRows.add(id);
            renderTable();
            updateBulkBar();
        }

        function toggleSelectAll() {
            const selectAll = document.getElementById('selectAll');
            if (selectAll.checked) currentData.forEach(r => selectedRows.add(r.rowIndex));
            else selectedRows.clear();
            renderTable();
        }

        function bulkToggleStatus(newStatus) {
            selectedRows.forEach(id => updateStatus(id, newStatus));
            selectedRows.clear();
            setTimeout(fetchData, 1000);
        }

        function updateBulkBar() {
            const bar = document.getElementById('bulkBar');
            const count = selectedRows.size;
            document.getElementById('bulkSelected').textContent = `${count} נבחרו`;
            if (count > 0) bar.classList.add('visible'); else bar.classList.remove('visible');
        }

        function sortTable(field) {
            if (currentSort.field === field) currentSort.asc = !currentSort.asc; else { currentSort.field = field; currentSort.asc = true; }
            renderTable();
        }

        function clearFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('statusFilter').value = 'all';
            document.getElementById('clearBtn').disabled = true;
            fetchData();
        }

        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(fetchData, 300);
            document.getElementById('clearBtn').disabled = !document.getElementById('searchInput').value;
        });
        document.getElementById('statusFilter').addEventListener('change', () => {
            document.getElementById('clearBtn').disabled = false;
            fetchData();
        });

        function exportCSV() {
            const rows = currentData.map(r => [r.submissionDate.toISOString(), r.fullName, r.idNumber, r.phone, r.status]);
            const csv = [['תאריך','שם','ת.ז.','טלפון','סטטוס'], ...rows].map(r => r.join(',')).join('\n');
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = 'shield_candidates.csv'; a.click();
        }

        // ========== MODE ==========
        const modeToggle = document.getElementById('modeToggle');
        const body = document.body;
        const modeIcon = modeToggle.querySelector('.material-icons');
        function setMode(isLight) {
            if (isLight) { body.classList.add('light-mode'); modeIcon.textContent = 'light_mode'; localStorage.setItem('shield-dashboard-mode', 'light'); }
            else { body.classList.remove('light-mode'); modeIcon.textContent = 'dark_mode'; localStorage.setItem('shield-dashboard-mode', 'dark'); }
        }
        modeToggle.addEventListener('click', () => setMode(!body.classList.contains('light-mode')));
        const savedMode = localStorage.getItem('shield-dashboard-mode');
        if (savedMode === 'light') setMode(true); else setMode(false);

        window.addEventListener('scroll', () => document.getElementById('shieldHeader').classList.toggle('scrolled', window.scrollY > 50));

        // ========== INIT ==========
        (async function() {
            const savedToken = localStorage.getItem('shield-dashboard-token');
            const expiry = parseInt(localStorage.getItem('shield-dashboard-token-expiry') || '0');

            if (savedToken && Date.now() < expiry) {
                const valid = await validateToken(savedToken);
                if (valid) {
                    API_KEY = 'a7f9c2e1-4b6d-8a3f-2c7e9d5b1f0a';
                    document.getElementById('logoutBtn').style.display = 'flex';
                    startInactivityTimer();
                    fetchData();
                    setInterval(fetchData, 30000);
                    return;
                }
            }

            // לא מחובר – בקשת סיסמה
            const password = prompt('הזן סיסמה לגישה ללוח הבקרה:');
            if (password) {
                const success = await login(password);
                if (success) {
                    fetchData();
                    setInterval(fetchData, 30000);
                } else {
                    alert('סיסמה שגויה.');
                    location.reload();
                }
            } else {
                document.body.innerHTML = '<div style="text-align:center;padding:3rem;">נדרשת סיסמה לגישה.</div>';
            }
        })();

        // ========== INACTIVITY ==========
        ['mousemove', 'keydown', 'scroll', 'click'].forEach(evt => {
            window.addEventListener(evt, startInactivityTimer, { passive: true });
        });
    </script>
</body>
</html>
