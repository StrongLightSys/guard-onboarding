<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מעקב מועמדות – Shield</title>
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Heebo', sans-serif; direction: rtl; text-align: center; padding: 50px; background: #f6f7fa; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); display: inline-block; }
        .status { font-size: 1.5rem; font-weight: 700; color: #1e3b5c; }
    </style>
</head>
<body>
<div class="box">
    <h2>מעקב מועמדות</h2>
    <p id="status">טוען...</p>
    <p id="updated" style="color: #666;"></p>
</div>
<script>
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
        document.getElementById('status').textContent = 'חסר מזהה';
    } else {
        fetch('https://script.google.com/macros/s/AKfycbwUEmK3x6zg4nSf4SHTzzKTPp1ImIH3fsnoAuH7zRP37BKUUnPsMutnx9_ybIwsDXaudQ/exec?action=track&id=' + id)
            .then(r => r.json())
            .then(data => {
                if (data.error) throw new Error(data.error);
                document.getElementById('status').textContent = data.status;
                document.getElementById('updated').textContent = 'עודכן: ' + (data.lastUpdated || '');
            })
            .catch(err => {
                document.getElementById('status').textContent = 'שגיאה: ' + err.message;
            });
    }
</script>
</body>
</html>
